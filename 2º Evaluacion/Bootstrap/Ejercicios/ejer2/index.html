<!DOCTYPE html>
<html lang="en">
<head>
    <title>Title</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Alineación y espaciado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="estilos.css"> 
</head>
<body>
    <!-- 
        Alineación horizontal (justify-content-*)
        Alineación vertical (align-items-*)
        Separación de filas y columnas (gap-*) márgenes (mb-*, mt-*) rellenos (p-*)
        Alineación de texto (text-start, text-center y text-end)
        Bordes de elementos (border) 
        col - columnas max 12, col-6 (6 columnas), col-4 (4 columnas), col-3 (3 columnas)
    -->
    
    <div class="container border bg-light p-4">
        <!--Columna 1-->
        <div class="row bg-primary justify-content-center align-items-center gap-3 border mt-1 mb-1">
            <div class="col-4 bg-white text-center p-3 ">Columna 1</div> <!-- p = padding (relleno)-->
        </div>

        <!--Columna 2-->
        <div class="row justify-content-start gap-3 border mt-4 mb-4 bg-success">
            <div class="col-3 bg-warning border text-center p-2 ">Columna A</div>
            <div class="col-3 bg-danger border text-center p-2 text-white">Columna B</div>
            <div class="col-3 bg-info border text-center p-2">Columna C</div>º
        </div>

        <!--Columna 3-->
        <div class="row justify-content-around gap-3 border bg-warning mt-4 mb-4"> <!--Espacio a la izquierda 1, al centro 2, y a la derecha 1-->
            <div class="col-1 bg-white border text-center p-2 ">Elemento 1</div>
            <div class="col-1 bg-dark border text-center p-2 text-white">Elemento 2</div>
        </div>

        <!--Columna 4-->
        <div class="row justify-content-around align-items-center border bg-black mt-4 mb-4">
            <div class="col-6 bg-primary border text-start p-2 text-white">Izquierda</div>
            <div class="col-6 bg-success border text-end p-2 text-white">Derecha</div>
        </div>

    </div>
</body>
</html>
