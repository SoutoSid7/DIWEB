<!DOCTYPE html>
<html lang="en">
<head>
    <title>Ejer 3 Imagenes</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Alineación y espaciado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!--<link rel="stylesheet" href="estilos.css">  -->
</head>
<body>
    <!--
        fs-1: Tamaño de texto más grande.
        fs-6: Tamaño de texto más pequeño.
        display-1: Tamaño de encabezado más grande.
        display-6: Tamaño de encabezado más pequeño
    -->
    
    <div class="container">
        <h1 class="fs-1">Título grande responsive</h1>
        <p class="fs-4">
        Este texto cambia de tamaño automáticamente según el tamaño de la pantalla.
        </p>
        <p class="fs-6">
        Este es un texto más pequeño pero también responsive.
        </p>
    </div>
</body>
</html>
