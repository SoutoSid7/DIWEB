<!DOCTYPE html>
<html lang="en">
<head>
    <title>Ejer 3 Imagenes</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Alineación y espaciado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="estilos.css">  
</head>
<body>
    <!--
        fs-1: Tamaño de texto más grande.
        fs-6: Tamaño de texto más pequeño.
        display-1: Tamaño de encabezado más grande.
        display-6: Tamaño de encabezado más pequeño

        img-fluid: imagen responsive
        mx: centrar un elemento horizontalmente.
        d-block: Para centrar imágenes / haz que este elemento se comporte como un <div>
    -->
    
    <div class="container-fluid p-0"> <!-- Sin padding -->
        <header>
            <div class="row mt-4 mb-4"> 
                <div class="col-12 bg-body text-center">
                    <h1>Conciertos</h1>
                </div>
            </div>
        </header>
        <div class="row">
            <div id="carouselExampleCaptions" class="carousel slide">
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
                </div>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                    <img src="./imagenes/chicago.jpg" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Chicago</h5>
                        <p>Thank you, Chicago!.</p>
                    </div>
                    </div>
                    <div class="carousel-item">
                    <img src="./imagenes/ny.jpg" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>New York</h5>
                        <p>We love the Big Apple!.</p>
                    </div>
                    </div>
                    <div class="carousel-item">
                    <img src="./imagenes/la.jpg" class="d-block w-100" alt="...">
                    <div class="carousel-caption d-none d-md-block">
                        <h5>Los Angeles</h5>
                        <p>We had such a great time in LA!.</p>
                    </div>
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Fichero JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
